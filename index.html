<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Street Wars: Pro Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        
        /* شاشة التحميل */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white;
        }
        .loader {
            width: 50px; height: 50px; border: 5px solid #333;
            border-top: 5px solid #00ff00; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* تنبيه وضع العرض */
        @media screen and (orientation: portrait) {
            #landscape-notice { display: flex !important; }
        }
        #landscape-notice {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 200; color: white; text-align: center;
            flex-direction: column; align-items: center; justify-content: center;
        }

        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 12px;
            pointer-events: none; z-index: 10; border-left: 4px solid #00ff00;
        }

        /* أزرار التحكم - وضع العرض */
        .mobile-btn {
            position: absolute; background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 15px;
            width: 80px; height: 80px; display: flex; align-items: center;
            justify-content: center; color: white; font-size: 24px;
            user-select: none; z-index: 20; backdrop-filter: blur(5px);
        }
        #btn-up { bottom: 100px; right: 40px; background: rgba(0, 255, 0, 0.1); }
        #btn-down { bottom: 10px; right: 40px; }
        #btn-left { bottom: 10px; left: 20px; }
        #btn-right { bottom: 10px; left: 110px; }
        #btn-nitro { bottom: 100px; right: 130px; width: 60px; height: 60px; font-size: 14px; background: #f39c12; }

        #speed-box {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: #00ff00; text-align: center; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader"></div>
        <p>جاري تحميل الشوارع...</p>
    </div>

    <div id="landscape-notice">
        <div style="font-size: 40px;">🔄</div>
        <p>يرجى تدوير الهاتف لوضع العرض للعب</p>
    </div>

    <div id="ui">
        <div id="role-text" style="font-weight: bold; font-size: 18px;">STREET WARS</div>
        <div id="status">Online</div>
    </div>

    <div id="speed-box">
        <div style="font-size: 30px;" id="speed-val">0</div>
        <div style="font-size: 10px;">KM/H</div>
    </div>

    <div class="mobile-btn" id="btn-up">▲</div>
    <div class="mobile-btn" id="btn-down">▼</div>
    <div class="mobile-btn" id="btn-left">◀</div>
    <div class="mobile-btn" id="btn-right">▶</div>
    <div class="mobile-btn" id="btn-nitro">NITRO</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // إخفاء شاشة التحميل بعد ثانيتين
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
            }, 2000);
        };

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 10, 70);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping; // إضاءة سينمائية
        document.body.appendChild(renderer.domElement);

        // إضاءة النيون
        const ambient = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0x00ff00, 0.5);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        // إنشاء مدينة بسيطة (مكعبات في الخلفية)
        for(let i=0; i<50; i++) {
            const h = Math.random() * 10 + 2;
            const b = new THREE.Mesh(
                new THREE.BoxGeometry(2, h, 2),
                new THREE.MeshStandardMaterial({ color: 0x111111 })
            );
            b.position.set(Math.random()*100-50, h/2, Math.random()*100-50);
            scene.add(b);
        }

        const grid = new THREE.GridHelper(200, 60, 0x00ff00, 0x111111);
        scene.add(grid);

        function createCar() {
            const group = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 0.5, 2.4),
                new THREE.MeshStandardMaterial({ color: 0x00ff00, roughness: 0.1, metalness: 0.8 })
            );
            body.position.y = 0.3;
            group.add(body);
            
            // كشافات أمامية حقيقية
            const headLight = new THREE.SpotLight(0xffffff, 2, 10, 0.5);
            headLight.position.set(0, 0.5, -1.2);
            headLight.target.position.set(0, 0, -5);
            group.add(headLight);
            group.add(headLight.target);

            return group;
        }

        const myCar = createCar();
        scene.add(myCar);

        // نظام التحكم المطور
        const controls = { up: false, down: false, left: false, right: false, nitro: false };
        const setupBtn = (id, key) => {
            const btn = document.getElementById(id);
            const start = (e) => { e.preventDefault(); controls[key] = true; };
            const end = (e) => { e.preventDefault(); controls[key] = false; };
            btn.addEventListener('touchstart', start);
            btn.addEventListener('touchend', end);
            btn.addEventListener('mousedown', start);
            btn.addEventListener('mouseup', end);
        };

        setupBtn('btn-up', 'up'); setupBtn('btn-down', 'down');
        setupBtn('btn-left', 'left'); setupBtn('btn-right', 'right');
        setupBtn('btn-nitro', 'nitro');

        let speed = 0;
        let rot = 0;

        function animate() {
            requestAnimationFrame(animate);
            
            let targetMax = controls.nitro ? 1.0 : 0.4;
            if (controls.up) speed = THREE.MathUtils.lerp(speed, targetMax, 0.05);
            else if (controls.down) speed = THREE.MathUtils.lerp(speed, -0.2, 0.05);
            else speed = THREE.MathUtils.lerp(speed, 0, 0.02);

            if (controls.left) rot = THREE.MathUtils.lerp(rot, 0.05, 0.1);
            else if (controls.right) rot = THREE.MathUtils.lerp(rot, -0.05, 0.1);
            else rot = THREE.MathUtils.lerp(rot, 0, 0.1);

            myCar.rotation.y += rot * (Math.abs(speed) + 0.1);
            myCar.translateZ(-speed);

            document.getElementById('speed-val').innerText = Math.round(Math.abs(speed * 240));

            // كاميرا مطاردة سينمائية
            const camOffset = new THREE.Vector3(0, 2.5, 6).applyMatrix4(myCar.matrixWorld);
            camera.position.lerp(camOffset, 0.1);
            camera.lookAt(myCar.position);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

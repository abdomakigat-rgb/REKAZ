<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Thumbnail Master | صانع الصور الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .loader { border-top-color: #38bdf8; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <header class="text-center mb-10">
        <h1 class="text-4xl md:text-6xl font-bold mb-4 gradient-text">Thumbnail Master AI</h1>
        <p class="text-gray-400 text-lg">اصنع غلاف يوتيوب احترافي بضغطة زر واحدة</p>
    </header>

    <main class="w-full max-w-4xl glass rounded-3xl p-6 md:p-10 shadow-2xl">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            
            <div class="flex flex-col gap-6">
                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-300">مفتاح API الخاص بك (OpenAI)</label>
                    <input type="password" id="apiKey" placeholder="sk-..." class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-sky-500 outline-none transition-all">
                </div>

                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-300">وصف الفيديو (Prompt)</label>
                    <textarea id="prompt" rows="4" placeholder="مثلاً: رجل مندهش أمام شاشة كمبيوتر في غرفة جيمنج مظلمة بأضواء نيون زرقاء..." class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-sky-500 outline-none transition-all"></textarea>
                </div>

                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-300">النمط الفني (Art Style)</label>
                    <select id="style" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-sky-500 outline-none">
                        <option value="Cinematic, highly detailed, photorealistic">سينمائي واقعي</option>
                        <option value="Digital illustration, vibrant colors, 3D render">رسم رقمي (3D)</option>
                        <option value="Anime style, sharp lines, dramatic lighting">أنيمي / كرتون</option>
                        <option value="Minimalist, clean, bold typography layout">بسيط وعصري</option>
                    </select>
                </div>

                <button onclick="generateImage()" id="genBtn" class="w-full py-4 bg-sky-600 hover:bg-sky-500 rounded-xl font-bold text-white transition-all transform hover:scale-[1.02] active:scale-95 shadow-lg shadow-sky-900/20">
                    توليد الصورة الآن ✨
                </button>
            </div>

            <div class="flex flex-col items-center justify-center border-2 border-dashed border-slate-700 rounded-3xl relative overflow-hidden min-h-[300px] bg-slate-900/50">
                <div id="placeholder" class="text-gray-500 text-center p-6">
                    <svg class="w-16 h-16 mx-auto mb-4 opacity-20" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"></path></svg>
                    <p>ستظهر صورتك هنا</p>
                </div>

                <div id="loading" class="hidden absolute flex flex-col items-center">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-700 h-12 w-12 mb-4"></div>
                    <p class="text-sky-400 animate-pulse">جاري التصميم...</p>
                </div>

                <img id="resultImage" class="hidden w-full h-full object-cover rounded-2xl">
                
                <a id="downloadBtn" class="hidden absolute bottom-4 right-4 bg-green-600 p-2 rounded-full hover:bg-green-500 transition-colors">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                </a>
            </div>
        </div>
    </main>

    <footer class="mt-10 text-gray-500 text-sm">
        Powered by OpenAI DALL-E 3 & TailwindCSS
    </footer>

    <script>
        async function generateImage() {
            const apiKey = document.getElementById('apiKey').value;
            const prompt = document.getElementById('prompt').value;
            const style = document.getElementById('style').value;
            
            if (!apiKey || !prompt) {
                alert('من فضلك أدخل مفتاح الـ API ووصف الصورة');
                return;
            }

            // UI State
            const btn = document.getElementById('genBtn');
            const loading = document.getElementById('loading');
            const placeholder = document.getElementById('placeholder');
            const resultImg = document.getElementById('resultImage');
            const downloadBtn = document.getElementById('downloadBtn');

            btn.disabled = true;
            loading.classList.remove('hidden');
            placeholder.classList.add('hidden');
            resultImg.classList.add('hidden');
            downloadBtn.classList.add('hidden');

            try {
                const response = await fetch('https://api.openai.com/v1/images/generations', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "dall-e-3",
                        prompt: `YouTube thumbnail, ${style}, subject: ${prompt}, hyper-realistic, 4k, vivid lighting, high click-through rate design.`,
                        n: 1,
                        size: "1024x1024"
                    })
                });

                const data = await response.json();
                
                if (data.error) throw new Error(data.error.message);

                const imageUrl = data.data[0].url;
                resultImg.src = imageUrl;
                resultImg.classList.remove('hidden');
                
                // Setup Download
                downloadBtn.href = imageUrl;
                downloadBtn.target = "_blank";
                downloadBtn.classList.remove('hidden');

            } catch (error) {
                alert('خطأ: ' + error.message);
                placeholder.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>

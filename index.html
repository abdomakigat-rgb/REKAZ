<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>رِكاز | REKAZ 2026</title>
    
    <meta name="theme-color" content="#D4AF37">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #D4AF37; --dark: #0A0A0A; }
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--dark); 
            color: white; 
            -webkit-tap-highlight-color: transparent;
            user-select: none; /* حماية المحتوى من النسخ */
        }

        /* تأثيرات مكي الملكية */
        .maki-gradient {
            background: linear-gradient(135deg, #D4AF37 0%, #F9F4E8 50%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 2rem;
        }

        .btn-maki {
            background: linear-gradient(90deg, #B8860B, #D4AF37);
            color: black;
            font-weight: 900;
            transition: 0.4s all cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-maki:active { transform: scale(0.95); }

        /* أنيميشن الدخول */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reveal { animation: fadeInUp 0.8s forwards; }

        /* إخفاء السكرول بار */
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="min-h-screen">

    <div id="auth-screen" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-6">
        <div class="glass-panel w-full max-w-md p-10 text-center reveal relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-gold/10 blur-3xl rounded-full"></div>
            
            <h1 class="text-6xl font-black maki-gradient mb-2">رِكاز</h1>
            <p class="text-gray-500 text-xs tracking-widest mb-8 font-bold">نظام مكي التعليمي 2026</p>

            <div id="auth-tabs" class="flex bg-white/5 p-1 rounded-2xl mb-6">
                <button onclick="toggleAuth('login')" id="btn-login" class="flex-1 py-3 rounded-xl font-bold transition-all bg-gold text-black">دخول</button>
                <button onclick="toggleAuth('signup')" id="btn-signup" class="flex-1 py-3 rounded-xl font-bold transition-all text-gray-400">حساب جديد</button>
            </div>

            <div class="space-y-4" id="auth-inputs">
                </div>

            <button onclick="handleAuth()" class="w-full btn-maki py-4 mt-8 rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-gold/20">
                <span id="auth-action-text">دخول النادي الملكي</span>
                <i data-lucide="shield-check"></i>
            </button>
        </div>
    </div>

    <div id="app-content" class="hidden opacity-0 transition-opacity duration-1000">
        
        <header class="sticky top-0 z-50 glass-panel !rounded-none !border-t-0 !border-x-0 p-6 flex justify-between items-center bg-black/60">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <img id="user-avatar" src="" class="w-14 h-14 rounded-2xl object-cover border-2 border-gold shadow-gold/30 shadow-md">
                    <div class="absolute -bottom-1 -right-1 bg-green-500 w-4 h-4 rounded-full border-2 border-black"></div>
                </div>
                <div>
                    <h2 id="display-name" class="font-black text-lg"></h2>
                    <span id="display-rank" class="text-[10px] bg-gold/10 text-gold px-2 py-0.5 rounded-full font-black border border-gold/20">طالب ملكي</span>
                </div>
            </div>
            <button onclick="location.reload()" class="p-3 bg-red-500/10 text-red-500 rounded-xl"><i data-lucide="power"></i></button>
        </header>

        <main class="p-6 space-y-10 pb-32">
            
            <section class="reveal">
                <h3 class="text-3xl font-black italic mb-2">أهلاً بك في <span class="maki-gradient">رِكاز</span></h3>
                <p class="text-gray-500 text-sm font-bold">اختر مادتك وابدأ رحلة التفوق اليوم.</p>
            </section>

            <section>
                <div class="flex items-center justify-between mb-6">
                    <h4 class="font-black text-xl border-r-4 border-gold pr-3">المكتبة الرقمية</h4>
                    <span id="stage-badge" class="text-[10px] text-gray-400 font-bold"></span>
                </div>
                <div id="library-grid" class="grid grid-cols-2 gap-4">
                    </div>
            </section>

            <div id="quiz-container" class="hidden fixed inset-0 z-[60] bg-black p-6 flex flex-col">
                <div class="flex justify-between items-center mb-8">
                    <button onclick="closeQuiz()" class="text-gray-400"><i data-lucide="x-circle"></i></button>
                    <div id="quiz-timer" class="text-red-500 font-black text-xl font-mono">10:00</div>
                </div>
                <div id="quiz-box" class="glass-panel p-8 flex-1 flex flex-col justify-center text-center">
                    <h2 id="q-text" class="text-2xl font-bold mb-10 leading-relaxed"></h2>
                    <div id="q-options" class="grid gap-4"></div>
                </div>
                <button id="next-q-btn" onclick="nextQuestion()" class="w-full btn-maki py-5 mt-6 rounded-3xl opacity-50" disabled>السؤال التالي</button>
            </div>

        </main>

        <nav class="fixed bottom-6 left-6 right-6 h-20 glass-panel flex items-center justify-around px-4 z-50 shadow-2xl">
            <button onclick="showTab('books')" class="nav-item text-gold transition-all"><i data-lucide="home"></i></button>
            <button onclick="alert('قسم التلخيصات قريباً في تحديث مكي القادم!')" class="nav-item text-gray-500"><i data-lucide="file-text"></i></button>
            <button onclick="alert('مركز الدعم الفني لمكي متاح 24 ساعة')" class="nav-item text-gray-500"><i data-lucide="message-circle"></i></button>
        </nav>
    </div>

    <script>
        // قاعدة البيانات المتطورة
        const DATA = {
            stages: ["رابعة ابتدائي", "خامسة ابتدائي", "سادسة ابتدائي", "أولى إعدادي", "تانية إعدادي", "تالتة إعدادي", "أولى ثانوي", "تانية ثانوي", "تالتة ثانوي"],
            subjects: {
                elementary: ["اللغة العربية", "الرياضيات", "العلوم", "الدراسات"],
                secondary: ["الفيزياء", "الكيمياء", "الأحياء", "التاريخ", "الجغرافيا", "الفلسفة"]
            },
            questions: [
                { q: "ما هي عاصمة جمهورية مصر العربية؟", o: ["المنصورة", "القاهرة", "الإسكندرية", "الأقصر"], c: 1 },
                { q: "أكبر كوكب في المجموعة الشمسية هو؟", o: ["الأرض", "المريخ", "المشتري", "زحل"], c: 2 }
            ]
        };

        let currentAuthMode = 'login';
        let userPfp = "https://ui-avatars.com/api/?background=D4AF37&color=000&size=256";

        // تبديل واجهة الدخول
        function toggleAuth(mode) {
            currentAuthMode = mode;
            const inputs = document.getElementById('auth-inputs');
            document.getElementById('btn-login').className = mode === 'login' ? 'flex-1 py-3 rounded-xl font-bold bg-gold text-black' : 'flex-1 py-3 rounded-xl font-bold text-gray-400';
            document.getElementById('btn-signup').className = mode === 'signup' ? 'flex-1 py-3 rounded-xl font-bold bg-gold text-black' : 'flex-1 py-3 rounded-xl font-bold text-gray-400';
            
            if(mode === 'login') {
                inputs.innerHTML = `
                    <input type="text" id="u-name-in" placeholder="اسم المستخدم" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-gold transition-all">
                    <input type="password" id="u-pass-in" placeholder="كلمة المرور" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-gold transition-all">
                `;
            } else {
                inputs.innerHTML = `
                    <div class="flex justify-center mb-4">
                        <label class="w-20 h-20 rounded-2xl border-2 border-dashed border-gold/30 flex items-center justify-center cursor-pointer overflow-hidden">
                            <img id="temp-pfp" class="hidden w-full h-full object-cover">
                            <i id="cam-icon" data-lucide="camera" class="text-gold"></i>
                            <input type="file" class="hidden" onchange="previewImg(this)">
                        </label>
                    </div>
                    <input type="text" id="u-name-in" placeholder="اسمك بالكامل" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-gold transition-all">
                    <select id="u-stage-in" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-gold text-gray-400">
                        ${DATA.stages.map(s => `<option value="${s}">${s}</option>`).join('')}
                    </select>
                `;
            }
            lucide.createIcons();
        }

        function previewImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    userPfp = e.target.result;
                    document.getElementById('temp-pfp').src = e.target.result;
                    document.getElementById('temp-pfp').classList.remove('hidden');
                    document.getElementById('cam-icon').classList.add('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // معالجة الدخول
        function handleAuth() {
            const name = document.getElementById('u-name-in').value;
            if(!name) return alert("أدخل اسمك يا بطل!");

            const stage = document.getElementById('u-stage-in')?.value || "الثالث الثانوي";
            
            document.getElementById('display-name').innerText = name;
            document.getElementById('display-rank').innerText = stage;
            document.getElementById('stage-badge').innerText = `المنهج المعتمد لـ ${stage}`;
            document.getElementById('user-avatar').src = userPfp;

            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            setTimeout(() => { document.getElementById('app-content').classList.add('opacity-100'); }, 50);
            
            renderLibrary(stage);
        }

        function renderLibrary(stage) {
            const grid = document.getElementById('library-grid');
            const list = stage.includes("ابتدائي") ? DATA.subjects.elementary : DATA.subjects.secondary;
            
            grid.innerHTML = list.map(sub => `
                <div onclick="startQuiz('${sub}')" class="glass-panel p-6 text-center group hover:bg-gold/5 transition-all">
                    <div class="w-14 h-14 bg-gold/10 rounded-2xl mx-auto mb-4 flex items-center justify-center text-gold group-hover:scale-110 transition-all">
                        <i data-lucide="book-open"></i>
                    </div>
                    <h5 class="font-black text-xs mb-2">${sub}</h5>
                    <button class="text-[8px] bg-white/10 px-3 py-1 rounded-full text-gray-400 font-bold uppercase">فتح الكتاب</button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // نظام الاختبارات
        let currentSub = '';
        let qIndex = 0;

        function startQuiz(sub) {
            currentSub = sub;
            qIndex = 0;
            document.getElementById('quiz-container').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = DATA.questions[qIndex];
            if(!q) {
                alert("تهانينا! لقد أتممت اختبار " + currentSub);
                return closeQuiz();
            }
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('q-options').innerHTML = q.o.map((o, i) => `
                <button onclick="checkAnswer(${i}, ${q.c})" class="q-btn w-full p-5 rounded-2xl border border-white/5 bg-white/5 text-right font-bold transition-all">
                    ${o}
                </button>
            `).join('');
            document.getElementById('next-q-btn').disabled = true;
            document.getElementById('next-q-btn').classList.add('opacity-50');
        }

        function checkAnswer(idx, correct) {
            const btns = document.querySelectorAll('.q-btn');
            btns.forEach(b => b.disabled = true);
            if(idx === correct) {
                btns[idx].classList.add('bg-green-500/20', 'border-green-500', 'text-green-500');
            } else {
                btns[idx].classList.add('bg-red-500/20', 'border-red-500', 'text-red-500');
                btns[correct].classList.add('bg-green-500/20', 'border-green-500');
            }
            document.getElementById('next-q-btn').disabled = false;
            document.getElementById('next-q-btn').classList.remove('opacity-50');
        }

        function nextQuestion() { qIndex++; showQuestion(); }
        function closeQuiz() { document.getElementById('quiz-container').classList.add('hidden'); }

        // تشغيل أولي
        toggleAuth('login');
    </script>
</body>
</html>

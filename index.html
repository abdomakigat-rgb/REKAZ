<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Street Wars: Pro Mobile - Roleplay Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        
        /* شاشة تسجيل الدخول المتطورة */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #000, #0a0a2e); z-index: 150;
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
            overflow-y: auto; padding: 20px 0;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 20px;
            backdrop-filter: blur(15px); border: 1px solid #00f2ff; width: 320px; text-align: center;
        }
        input, select {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; 
            background: #111; color: white; box-sizing: border-box;
        }
        .side-select { display: flex; gap: 10px; margin: 10px 0; }
        .side-btn { 
            flex: 1; padding: 10px; border-radius: 8px; cursor: pointer; border: 2px solid transparent;
            font-weight: bold; transition: 0.3s; background: #222;
        }
        .side-btn.active-p { border-color: #0044ff; background: #001144; }
        .side-btn.active-t { border-color: #ff0000; background: #440000; }

        .start-btn {
            background: #00f2ff; color: black; border: none; padding: 15px 40px;
            border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px;
        }

        /* التحكم */
        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 12px;
            pointer-events: none; z-index: 10; border-left: 4px solid #00f2ff;
        }
        .mobile-btn {
            position: absolute; background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
            width: 70px; height: 70px; display: flex; align-items: center;
            justify-content: center; color: white; font-size: 20px;
            user-select: none; z-index: 20; backdrop-filter: blur(5px);
        }
        #btn-up { bottom: 100px; right: 40px; }
        #btn-down { bottom: 20px; right: 40px; }
        #btn-left { bottom: 20px; left: 20px; }
        #btn-right { bottom: 20px; left: 100px; }
        #btn-exit { top: 20px; right: 20px; border-radius: 10px; width: 100px; height: 45px; background: #e74c3c; font-size: 14px; }
        
        #speed-box {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: #00f2ff; text-align: center;
        }
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 200; display: none; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="login-box">
            <h2 style="color:#00f2ff">STREET WARS RP</h2>
            <input type="text" id="username" placeholder="اسم الشخصية..." maxlength="12">
            
            <p style="font-size: 14px; margin-bottom: 5px;">اختر الفريق:</p>
            <div class="side-select">
                <div class="side-btn" id="side-p" onclick="selectSide('police')">شرطة 👮</div>
                <div class="side-btn" id="side-t" onclick="selectSide('thief')">حرامي 🥷</div>
            </div>

            <p style="font-size: 14px; margin-bottom: 5px;">لون ملابس الشخصية:</p>
            <input type="color" id="char-color" value="#ffffff" style="height: 40px;">

            <select id="room-select">
                <option value="1">غرفة المدينة (حر)</option>
                <option value="2">غرفة المطاردة (ممتلئة)</option>
            </select>
            
            <button class="start-btn" onclick="startGame()">تشغيل المحرك</button>
        </div>
    </div>

    <div id="loading-screen"><div>جاري التحميل...</div></div>

    <div id="ui">
        <div id="player-info" style="font-weight: bold;">Driver: Guest</div>
        <div id="player-job">الفريق: لم يحدد</div>
        <div id="mode-text" style="color: #00f2ff;">الوضع: داخل السيارة</div>
    </div>

    <div id="speed-box">
        <div style="font-size: 24px;" id="speed-val">0</div>
        <div style="font-size: 10px;">KM/H</div>
    </div>

    <div class="mobile-btn" id="btn-up">▲</div>
    <div class="mobile-btn" id="btn-down">▼</div>
    <div class="mobile-btn" id="btn-left">◀</div>
    <div class="mobile-btn" id="btn-right">▶</div>
    <div class="mobile-btn" id="btn-exit">خروج/ركوب</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let gameStarted = false;
        let isDriving = true;
        let userSide = 'thief';
        let charColor = '#ffffff';
        
        // نظام الصوت (Audio Context)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let engineOsc;

        function selectSide(side) {
            userSide = side;
            document.getElementById('side-p').className = 'side-btn' + (side === 'police' ? ' active-p' : '');
            document.getElementById('side-t').className = 'side-btn' + (side === 'thief' ? ' active-t' : '');
        }

        function initEngineSound() {
            engineOsc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            engineOsc.type = 'sawtooth';
            engineOsc.frequency.setValueAtTime(50, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            engineOsc.connect(gain);
            gain.connect(audioCtx.destination);
            engineOsc.start();
            return engineOsc;
        }

        function startGame() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            charColor = document.getElementById('char-color').value;
            const name = document.getElementById('username').value || "Player1";
            
            document.getElementById('player-info').innerText = "Name: " + name;
            document.getElementById('player-job').innerText = "Team: " + (userSide === 'police' ? "Police" : "Thief");
            
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                gameStarted = true;
                initEngineSound();
                updateCarColors();
            }, 1000);
        }

        // إعداد المشهد والجرافيك
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        scene.fog = new THREE.Fog(0x020205, 5, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // تصميم السيارة
        function createCar() {
            const car = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.5, 3), new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8 }));
            body.position.y = 0.4;
            car.add(body);
            
            const roof = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 1.4), new THREE.MeshStandardMaterial({ color: 0x222222 }));
            roof.position.set(0, 0.8, 0.2);
            car.add(roof);

            return car;
        }

        // تصميم الشخصية
        function createCharacter() {
            const person = new THREE.Group();
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 1.6;
            person.add(head);
            
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.7), new THREE.MeshStandardMaterial({color: charColor}));
            body.position.y = 1.15;
            person.add(body);

            const legs = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.8, 0.2), new THREE.MeshStandardMaterial({color: 0x111111}));
            legs.position.y = 0.4;
            person.add(legs);

            person.visible = false;
            return person;
        }

        const myCar = createCar();
        const myChar = createCharacter();
        scene.add(myCar, myChar);

        function updateCarColors() {
            myCar.children[0].material.color.set(userSide === 'police' ? 0x0011ff : 0xff0000);
        }

        // الأرضية والمباني
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshStandardMaterial({color: 0x111111}));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);
        scene.add(new THREE.GridHelper(2000, 100, 0x00f2ff, 0x222222));

        for(let i=0; i<60; i++) {
            const h = Math.random()*20+5;
            const b = new THREE.Mesh(new THREE.BoxGeometry(5, h, 5), new THREE.MeshStandardMaterial({color: 0x050505}));
            b.position.set(Math.random()*300-150, h/2, Math.random()*300-150);
            if(Math.abs(b.position.x) < 15) b.position.x += 30;
            scene.add(b);
        }

        // تحكم
        const controls = { up: false, down: false, left: false, right: false };
        const setupBtn = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); controls[key] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); controls[key] = false; });
        };
        ['up', 'down', 'left', 'right'].forEach(k => setupBtn('btn-'+k, k));

        document.getElementById('btn-exit').addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDriving = !isDriving;
            if(isDriving) {
                myChar.visible = false;
                document.getElementById('mode-text').innerText = "الوضع: داخل السيارة";
            } else {
                myChar.position.copy(myCar.position);
                myChar.position.x += 2;
                myChar.visible = true;
                document.getElementById('mode-text').innerText = "الوضع: مشي حر";
            }
        });

        let speed = 0;
        let moveX = 0, moveZ = 0;

        function animate() {
            requestAnimationFrame(animate);
            if(!gameStarted) return;

            if(isDriving) {
                if (controls.up) speed = THREE.MathUtils.lerp(speed, 1.0, 0.05);
                else if (controls.down) speed = THREE.MathUtils.lerp(speed, -0.4, 0.05);
                else speed = THREE.MathUtils.lerp(speed, 0, 0.02);

                if (controls.left) myCar.rotation.y += 0.04 * (speed + 0.1);
                if (controls.right) myCar.rotation.y -= 0.04 * (speed + 0.1);
                myCar.translateZ(-speed);
                
                // تحديث تردد الصوت بناءً على السرعة
                if(engineOsc) engineOsc.frequency.setTargetAtTime(50 + (Math.abs(speed) * 150), audioCtx.currentTime, 0.1);
            } else {
                speed = 0;
                if(engineOsc) engineOsc.frequency.setTargetAtTime(40, audioCtx.currentTime, 0.1);
                if (controls.up) myChar.translateZ(0.15);
                if (controls.down) myChar.translateZ(-0.1);
                if (controls.left) myChar.rotation.y += 0.05;
                if (controls.right) myChar.rotation.y -= 0.05;
            }

            document.getElementById('speed-val').innerText = Math.round(Math.abs(speed * 200));

            const target = isDriving ? myCar : myChar;
            const camOffset = new THREE.Vector3(0, 3, 7).applyMatrix4(target.matrixWorld);
            camera.position.lerp(camOffset, 0.1);
            camera.lookAt(target.position);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

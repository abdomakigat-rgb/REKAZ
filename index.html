<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Wars: Multiplayer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px;
            pointer-events: none;
        }
        .controls { font-size: 12px; color: #ccc; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>Street Wars Online</h2>
        <div id="status">جاري الاتصال بالسيرفر...</div>
        <div class="controls">استخدم الأسهم للتحرك | ESC للخروج</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

    <script>
        // 1. إعداد السيرفر (استبدل الرابط برابط سيرفرك عند الرفع)
        const socket = io('http://localhost:3000');
        
        // 2. إعداد مشهد Three.js
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // إضاءة احترافية
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(5, 10, 7);
        scene.add(sunLight);

        // أرضية المدينة (Grid)
        const grid = new THREE.GridHelper(200, 50, 0x444444, 0x222222);
        scene.add(grid);

        // 3. تعريف اللاعبين
        let otherPlayers = {};
        let myCar;

        // دالة لإنشاء شكل سيارة
        function createCar(color = 0x00ff00) {
            const group = new THREE.Group();
            // جسم السيارة
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 0.6, 2.5),
                new THREE.MeshStandardMaterial({ color: color })
            );
            body.position.y = 0.3;
            group.add(body);
            // سقف السيارة
            const roof = new THREE.Mesh(
                new THREE.BoxGeometry(1, 0.5, 1.2),
                new THREE.MeshStandardMaterial({ color: color })
            );
            roof.position.y = 0.8;
            roof.position.z = -0.2;
            group.add(roof);
            return group;
        }

        // إنشاء سيارتي أنا
        myCar = createCar(0x00ff00); // أخضر للاعب الحالي
        scene.add(myCar);

        // 4. نظام التحكم
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        let speed = 0;
        const maxSpeed = 0.5;
        const acceleration = 0.01;
        const friction = 0.005;

        // 5. التعامل مع بيانات السيرفر (Socket Events)
        socket.on('connect', () => {
            document.getElementById('status').innerText = "متصل أونلاين";
        });

        socket.on('currentPlayers', (players) => {
            Object.keys(players).forEach((id) => {
                if (id !== socket.id) {
                    addOtherPlayer(id, players[id]);
                }
            });
        });

        socket.on('newPlayer', (data) => {
            addOtherPlayer(data.id, data.data);
        });

        socket.on('playerMoved', (data) => {
            if (otherPlayers[data.id]) {
                otherPlayers[data.id].position.set(data.data.x, 0, data.data.z);
                otherPlayers[data.id].rotation.y = data.data.rotation;
            }
        });

        socket.on('playerDisconnected', (id) => {
            scene.remove(otherPlayers[id]);
            delete otherPlayers[id];
        });

        function addOtherPlayer(id, data) {
            const color = data.role === 'police' ? 0x0000ff : 0xff0000;
            otherPlayers[id] = createCar(color);
            scene.add(otherPlayers[id]);
        }

        // 6. حلقة التحديث والرسم (Game Loop)
        function update() {
            // منطق الحركة
            if (keys['ArrowUp']) speed = Math.min(speed + acceleration, maxSpeed);
            else if (keys['ArrowDown']) speed = Math.max(speed - acceleration, -maxSpeed/2);
            else {
                if (speed > 0) speed -= friction;
                if (speed < 0) speed += friction;
            }

            if (keys['ArrowLeft']) myCar.rotation.y += 0.04;
            if (keys['ArrowRight']) myCar.rotation.y -= 0.04;

            myCar.translateZ(-speed);

            // إرسال التحديث للسيرفر
            socket.emit('playerMovement', {
                x: myCar.position.x,
                z: myCar.position.z,
                rotation: myCar.rotation.y
            });

            // جعل الكاميرا تتبع السيارة
            const relativeCameraOffset = new THREE.Vector3(0, 3, 7);
            const cameraOffset = relativeCameraOffset.applyMatrix4(myCar.matrixWorld);
            camera.position.lerp(cameraOffset, 0.1);
            camera.lookAt(myCar.position);
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        // التعامل مع تغيير حجم النافذة
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Wars: Extreme Pursuit</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.7); padding: 20px; border-radius: 15px;
            border: 1px solid #333; pointer-events: none;
        }
        #speed-box {
            position: absolute; bottom: 30px; right: 30px; color: #00ff00;
            background: rgba(0,0,0,0.8); padding: 20px; border-radius: 50%;
            width: 80px; height: 80px; display: flex; align-items: center;
            justify-content: center; border: 4px solid #00ff00; font-weight: bold; font-size: 24px;
        }
        .police-ui { color: #3498db; }
        .criminal-ui { color: #e74c3c; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 id="role-text">Street Wars</h2>
        <div id="status">جاري الاتصال...</div>
        <div style="margin-top:10px; font-size: 13px;">
            SHIFT: نيترو | الأسهم: قيادة
        </div>
    </div>

    <div id="speed-box"><span id="speed-val">0</span></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

    <script>
        const socket = io('http://localhost:3000');
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x111111, 10, 50); // تأثير ضبابي لزيادة الواقعية

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // إضاءة ليلية
        scene.add(new THREE.AmbientLight(0x404040, 0.5));
        const cityLight = new THREE.PointLight(0xffffff, 1);
        cityLight.position.set(0, 50, 0);
        scene.add(cityLight);

        // إنشاء الطريق
        const roadGeo = new THREE.PlaneGeometry(200, 200);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        scene.add(road);
        scene.add(new THREE.GridHelper(200, 40, 0xffffff, 0x333333));

        // دالة إنشاء سيارة متطورة
        function createCar(isPolice = false) {
            const group = new THREE.Group();
            const color = isPolice ? 0x1a1a1a : 0xcc0000;
            
            // الجسم
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 0.5, 2.5),
                new THREE.MeshStandardMaterial({ color: color })
            );
            body.position.y = 0.4;
            group.add(body);

            // الكشافات الأمامية (Headlights)
            const lightGeo = new THREE.BoxGeometry(0.4, 0.1, 0.1);
            const lightMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const l1 = new THREE.Mesh(lightGeo, lightMat);
            l1.position.set(0.3, 0.4, -1.25);
            group.add(l1);
            const l2 = l1.clone();
            l2.position.x = -0.3;
            group.add(l2);

            if(isPolice) {
                // سارينة الشرطة
                const sirenGeo = new THREE.BoxGeometry(0.8, 0.1, 0.2);
                const sirenMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
                const siren = new THREE.Mesh(sirenGeo, sirenMat);
                siren.position.y = 0.9;
                group.add(siren);
                group.userData.siren = siren; // لحفظ المرجع عشان نغير لونه
            }

            return group;
        }

        // إعداد اللاعب الحالي
        let isPolice = Math.random() > 0.5;
        let myCar = createCar(isPolice);
        scene.add(myCar);
        
        document.getElementById('role-text').innerText = isPolice ? "أنت: الشرطة" : "أنت: هارب";
        document.getElementById('role-text').className = isPolice ? "police-ui" : "criminal-ui";

        // التحكم والحركة
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        let speed = 0;
        let rotationSpeed = 0;

        function update() {
            // منطق القيادة
            let currentMax = keys['ShiftLeft'] ? 0.8 : 0.4; // نيترو
            
            if (keys['ArrowUp']) speed = THREE.MathUtils.lerp(speed, currentMax, 0.05);
            else if (keys['ArrowDown']) speed = THREE.MathUtils.lerp(speed, -0.2, 0.05);
            else speed = THREE.MathUtils.lerp(speed, 0, 0.02);

            if (keys['ArrowLeft']) rotationSpeed = THREE.MathUtils.lerp(rotationSpeed, 0.04, 0.1);
            else if (keys['ArrowRight']) rotationSpeed = THREE.MathUtils.lerp(rotationSpeed, -0.04, 0.1);
            else rotationSpeed = THREE.MathUtils.lerp(rotationSpeed, 0, 0.1);

            myCar.rotation.y += rotationSpeed * (speed * 2);
            myCar.translateZ(-speed);

            // تحديث الواجهة
            document.getElementById('speed-val').innerText = Math.round(Math.abs(speed * 200));

            // تأثير السارينة (لو شرطة)
            if(isPolice && myCar.userData.siren) {
                const t = Date.now() * 0.01;
                myCar.userData.siren.material.color.setHex(Math.sin(t) > 0 ? 0xff0000 : 0x0000ff);
            }

            // الكاميرا (Chase Camera)
            const offset = new THREE.Vector3(0, 2, 6);
            const worldOffset = offset.applyMatrix4(myCar.matrixWorld);
            camera.position.lerp(worldOffset, 0.1);
            camera.lookAt(myCar.position);

            // إرسال البيانات للسيرفر
            socket.emit('playerMovement', {
                x: myCar.position.x,
                z: myCar.position.z,
                rotation: myCar.rotation.y,
                isPolice: isPolice
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }
        animate();

        // Socket Events
        socket.on('playerMoved', (data) => {
            if (!otherPlayers[data.id]) {
                otherPlayers[data.id] = createCar(data.data.isPolice);
                scene.add(otherPlayers[id]);
            }
            otherPlayers[data.id].position.set(data.data.x, 0, data.data.z);
            otherPlayers[data.id].rotation.y = data.data.rotation;
        });

    </script>
</body>
</html>

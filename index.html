<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ab Maki - Live Studio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes marquee {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .animate-marquee { display: inline-block; animation: marquee 15s linear infinite; }
        .glass { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white font-sans overflow-hidden">

    <div class="relative w-full h-[85vh] bg-black group">
        <video id="main-stream" autoplay playsinline class="w-full h-full object-contain"></video>

        <div class="absolute top-8 left-8 bg-red-600 px-5 py-3 rounded-2xl shadow-2xl border-2 border-white/20 flex items-center gap-3 animate-bounce shadow-red-500/20">
            <i class="fas fa-bell text-xl"></i>
            <span class="font-black text-lg">اشترك يا مكي! 🔥</span>
        </div>

        <div class="absolute bottom-0 w-full glass py-3 overflow-hidden">
            <div class="animate-marquee whitespace-nowrap text-xl font-bold text-cyan-400">
                🔥 بث مباشر من استوديو Ab Maki - أهلاً بكل المشاهدين - لا تنسوا اللايك والاشتراك لتفعيل ميزة التحديات الجديدة 🔥
            </div>
        </div>

        <div class="absolute right-0 top-0 w-80 h-full glass p-4 transition-transform duration-500" id="chat-box">
            <div class="flex items-center justify-between mb-4 border-b border-white/10 pb-2">
                <span class="font-bold text-cyan-400"><i class="fas fa-comments"></i> الدردشة المباشرة</span>
                <span class="text-xs text-gray-400">1.2K مشاهدة</span>
            </div>
            <div id="messages-container" class="space-y-4 h-[70vh] overflow-y-auto pr-2">
                </div>
        </div>
    </div>

    <div class="h-[15vh] bg-[#111] border-t border-white/5 flex items-center justify-between px-12">
        <div class="flex gap-4">
            <button onclick="startScreenShare()" class="bg-blue-600 hover:bg-blue-700 px-8 py-3 rounded-xl font-bold transition-all flex items-center gap-2">
                <i class="fas fa-desktop"></i> مشاركة الشاشة
            </button>
            <button onclick="startCamera()" class="bg-zinc-800 hover:bg-zinc-700 px-8 py-3 rounded-xl font-bold transition-all flex items-center gap-2">
                <i class="fas fa-camera"></i> الكاميرا
            </button>
        </div>

        <div class="flex items-center gap-6">
            <div class="text-center">
                <p class="text-xs text-gray-500 uppercase tracking-widest">حالة البث</p>
                <p class="text-green-500 font-bold" id="status">مستعد للبدء</p>
            </div>
            <button id="live-btn" onclick="toggleLive()" class="bg-red-600 hover:bg-red-700 px-12 py-4 rounded-2xl font-black text-lg shadow-lg shadow-red-600/20 transition-all">
                بث مباشر الآن
            </button>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('main-stream');
        const messagesContainer = document.getElementById('messages-container');
        let isLive = false;

        // 1. تشغيل الكاميرا
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                videoElement.srcObject = stream;
            } catch (err) { console.error("Error: ", err); }
        }

        // 2. تشغيل مشاركة الشاشة
        async function startScreenShare() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                videoElement.srcObject = stream;
            } catch (err) { console.error("Error: ", err); }
        }

        // 3. محاكاة التعليقات الحقيقية (بإمكانك ربطها بـ YouTube API لاحقاً)
        const fakeUsers = ["محمد علي", "سارة مكي", "ياسين", "بودا", "أحمد خالد"];
        const fakeTexts = ["منور يا مكي!", "أفضل مطور في الأقصر والله", "استمر يا وحش 🚀", "كيف عملت هذا الموقع؟", "ممكن ألعب معاك؟"];

        function addComment() {
            const user = fakeUsers[Math.floor(Math.random() * fakeUsers.length)];
            const text = fakeTexts[Math.floor(Math.random() * fakeTexts.length)];
            
            const commentHTML = `
                <div class="bg-white/5 p-3 rounded-xl border-r-4 border-cyan-500 animate-fade-in">
                    <p class="text-xs font-bold text-cyan-400">${user}</p>
                    <p class="text-sm text-gray-200">${text}</p>
                </div>
            `;
            messagesContainer.insertAdjacentHTML('afterbegin', commentHTML);
        }

        setInterval(addComment, 3000); // إضافة تعليق كل 3 ثواني

        // 4. تفعيل البث
        function toggleLive() {
            isLive = !isLive;
            const btn = document.getElementById('live-btn');
            const status = document.getElementById('status');
            
            if (isLive) {
                btn.innerText = "إنهاء البث";
                btn.classList.replace('bg-red-600', 'bg-zinc-700');
                status.innerText = "LIVE NOW";
                status.classList.replace('text-green-500', 'text-red-500');
                alert("البث الآن يظهر للجمهور مع الملصقات والتعليقات!");
            } else {
                location.reload();
            }
        }
    </script>
</body>
</html>

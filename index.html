<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ab Maki Puzzles - مواجهة الألغاز</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #00f2ff; --danger: #ff3e3e; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        
        /* تقسيم الشاشة */
        .game-grid { display: grid; grid-template-rows: 1fr 1fr; height: 100vh; position: relative; }
        .video-wrapper { position: relative; background: #000; border: 1px solid #1a1a1a; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .mirror { transform: scaleX(-1); }

        /* صندوق الألغاز العائم */
        .puzzle-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 400px; background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(15px); border: 2px solid var(--primary);
            border-radius: 25px; padding: 25px; text-align: center; z-index: 100;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        .puzzle-text { font-size: 1.4rem; font-weight: bold; margin: 15px 0; min-height: 60px; color: #fff; }
        
        /* الأزرار */
        .btn {
            background: linear-gradient(90deg, #00f2ff, #0072ff);
            border: none; padding: 12px 25px; border-radius: 12px;
            color: white; font-weight: bold; cursor: pointer;
            transition: 0.3s; width: 100%; font-size: 1rem;
        }
        .btn:active { transform: scale(0.95); }

        .timer-bar { height: 5px; background: var(--danger); width: 100%; margin-top: 15px; border-radius: 10px; transition: width 1s linear; }

        /* معلومات اللاعبين */
        .player-tag {
            position: absolute; bottom: 15px; right: 15px;
            background: rgba(0,0,0,0.6); padding: 5px 12px;
            border-radius: 8px; font-size: 12px; border: 1px solid var(--primary);
        }
        .room-id { position: fixed; top: 10px; left: 10px; font-size: 10px; color: #555; z-index: 200; }
    </style>
</head>
<body>

    <div class="room-id">Server: Connected</div>

    <div class="game-grid">
        <div class="video-wrapper">
            <video id="remote-video" autoplay></video>
            <div class="player-tag"><i class="fas fa-user-secret"></i> الخصم</div>
        </div>

        <div class="puzzle-overlay">
            <div id="setup-ui">
                <h2 style="color: var(--primary)">تحدي الوجوه</h2>
                <p>انتظر حتى تفتح الكاميرا، ثم اضغط ابدأ</p>
                <button class="btn" onclick="requestNextPuzzle()">بدء التحدي <i class="fas fa-play"></i></button>
            </div>

            <div id="game-ui" style="display: none;">
                <div class="puzzle-text" id="puzzle-display">ما هو الشيء الذي يكتب ولا يقرأ؟</div>
                <div class="timer-bar" id="timer-line"></div>
                <button class="btn" style="margin-top:20px" onclick="requestNextPuzzle()">اللغز التالي <i class="fas fa-forward"></i></button>
            </div>
        </div>

        <div class="video-wrapper">
            <video id="local-video" class="mirror" autoplay muted></video>
            <div class="player-tag"><i class="fas fa-user"></i> أنت (Ab Maki)</div>
        </div>
    </div>

    <script>
        // الربط مع السيرفر (لو شغال محلي استخدم localhost:3000)
        const socket = io('http://localhost:3000'); 
        const myPeer = new Peer();
        
        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');
        const ROOM_ID = "maki_pro_room"; // اسم الغرفة الموحد

        let myStream;

        // 1. تشغيل كاميرتك
        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
            myStream = stream;
            localVideo.srcObject = stream;

            // استقبال اتصال من صديق
            myPeer.on('call', call => {
                call.answer(stream);
                call.on('stream', userStream => {
                    remoteVideo.srcObject = userStream;
                });
            });

            // عندما يتصل مستخدم جديد بالسيرفر
            socket.on('user-connected', userId => {
                const call = myPeer.call(userId, stream);
                call.on('stream', userStream => {
                    remoteVideo.srcObject = userStream;
                });
            });
        });

        myPeer.on('open', id => {
            socket.emit('join-room', ROOM_ID, id);
        });

        // 2. إدارة الألغاز
        const puzzles = [
            "شيء يملك أسنان كثيرة لكنه لا يعض؟",
            "له عين واحدة ولكنه لا يرى؟",
            "يسمع بلا أذن ويتكلم بلا لسان؟",
            "حاجة كل ما تذبحها تعيط أنت عليها؟",
            "يمشي وراك طول النهار ويختفي بالليل؟"
        ];

        function requestNextPuzzle() {
            const p = puzzles[Math.floor(Math.random() * puzzles.length)];
            socket.emit('send-puzzle', p);
        }

        socket.on('new-puzzle', puzzle => {
            document.getElementById('setup-ui').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('puzzle-display').innerText = puzzle;
            resetTimer();
        });

        function resetTimer() {
            const line = document.getElementById('timer-line');
            line.style.transition = 'none';
            line.style.width = '100%';
            setTimeout(() => {
                line.style.transition = 'width 20s linear';
                line.style.width = '0%';
            }, 50);
        }
    </script>
</body>
</html>

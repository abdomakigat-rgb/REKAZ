<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ab Maki - Real Live Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes marquee { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .animate-marquee { display: inline-block; animation: marquee 15s linear infinite; }
        .glass { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans overflow-hidden">

    <div class="absolute top-4 left-1/2 -translate-x-1/2 z-50 flex flex-col items-center gap-3">
        <div class="flex gap-2 items-center bg-zinc-900 p-2 rounded-full border border-white/10 shadow-2xl">
            <span class="text-xs text-gray-400 px-2">ID البث الخاص بك: <span id="my-id" class="text-cyan-400 font-mono font-bold uppercase tracking-wider">جاري التحميل...</span></span>
            <button onclick="copyInviteLink()" class="bg-cyan-600 text-xs px-4 py-1 rounded-full font-bold hover:bg-cyan-500 transition-all">
                نسخ رابط الدعوة 🔗
            </button>
        </div>

        <div class="flex gap-2 p-1 bg-black/50 backdrop-blur rounded-xl border border-white/10 shadow-lg">
            <input id="join-id-input" type="text" placeholder="حط ID صاحبك هنا..." class="bg-zinc-800 text-[11px] p-2 rounded-lg border border-white/5 outline-none focus:border-green-500 w-44 text-center font-mono">
            <button onclick="joinByInputId()" class="bg-green-600 text-xs px-4 py-1 rounded-lg font-bold hover:bg-green-500 transition-all">مشاهدة الآن</button>
        </div>
    </div>

    <div class="relative w-full h-[85vh] bg-black group">
        <video id="main-stream" autoplay playsinline class="w-full h-full object-contain"></video>

        <div class="absolute top-24 left-8 bg-red-600 px-5 py-3 rounded-2xl shadow-xl flex items-center gap-3 animate-bounce z-30">
            <i class="fas fa-bell"></i>
            <span class="font-black text-lg">اشترك يا مكي! 🔥</span>
        </div>

        <div class="absolute bottom-0 w-full glass py-3 overflow-hidden z-20">
            <div class="animate-marquee whitespace-nowrap text-xl font-bold text-cyan-400">
                🚀 بث مباشر حقيقي من استوديو مكي - انسخ الـ ID اللي فوق وابعته لصاحبك عشان يتابعك 🚀
            </div>
        </div>

        <div class="absolute right-0 top-0 w-72 h-full glass p-4 z-10">
            <div class="border-b border-white/10 pb-2 mb-4 font-bold text-cyan-400 flex items-center gap-2">
                <i class="fas fa-circle text-[8px] animate-pulse text-red-600"></i> الدردشة المباشرة
            </div>
            <div id="messages-container" class="space-y-3 h-[70vh] overflow-y-auto"></div>
        </div>
    </div>

    <div class="h-[15vh] bg-[#0a0a0a] border-t border-white/5 flex items-center justify-between px-10">
        <div class="flex gap-4">
            <button onclick="startScreenShare()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-xl font-bold flex items-center gap-2 transition-all">
                <i class="fas fa-desktop"></i> مشاركة الشاشة
            </button>
            <button onclick="startCamera()" class="bg-zinc-800 hover:bg-zinc-700 px-6 py-3 rounded-xl font-bold flex items-center gap-2 transition-all">
                <i class="fas fa-camera"></i> الكاميرا
            </button>
        </div>

        <div class="flex items-center gap-4">
            <div id="status-dot" class="flex items-center gap-2 text-gray-500">
                <span class="w-3 h-3 bg-gray-500 rounded-full"></span>
                <span id="status-text" class="font-bold">غير متصل</span>
            </div>
            <button id="live-btn" onclick="toggleLive()" class="bg-green-600 hover:bg-green-700 px-10 py-4 rounded-2xl font-black text-lg transition-all shadow-lg shadow-green-900/20">
                بدء البث الحقيقي
            </button>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('main-stream');
        const messagesContainer = document.getElementById('messages-container');
        const myIdDisplay = document.getElementById('my-id');
        let currentStream;
        let peer;

        // 1. إعداد الـ Peer
        peer = new Peer(); 

        peer.on('open', (id) => {
            myIdDisplay.innerText = id;
            console.log('ID البث الخاص بك: ' + id);
        });

        // الرد على مكالمات المشاهدين وإرسال الفيديو لهم
        peer.on('call', (call) => {
            console.log("استقبال طلب مشاهدة...");
            if (currentStream) {
                call.answer(currentStream);
            } else {
                // لو المذيع نسي يشغل الكاميرا، نفتح كاميرا صامتة عشان الخط ما يقطعش
                navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(s => {
                    currentStream = s;
                    call.answer(s);
                });
            }
        });

        async function startCamera() {
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                videoElement.srcObject = currentStream;
                videoElement.muted = true;
            } catch (err) { alert("افتح الكاميرا أولاً يا مكي من إعدادات المتصفح!"); }
        }

        async function startScreenShare() {
            try {
                currentStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                videoElement.srcObject = currentStream;
                currentStream.getVideoTracks()[0].onended = () => { startCamera(); };
            } catch (err) { console.error(err); }
        }

        function copyInviteLink() {
            const id = myIdDisplay.innerText;
            if(id === "جاري التحميل...") return alert("استنى ثواني الـ ID بيجهز...");
            const link = window.location.href.split('?')[0] + "?join=" + id;
            navigator.clipboard.writeText(link);
            alert("تم نسخ رابط البث المباشر! ابعته لأصحابك.");
        }

        // الوظيفة الأساسية اللي طلبتها (الدخول بالـ ID يدوي)
        function joinByInputId() {
            const targetId = document.getElementById('join-id-input').value.trim();
            if(targetId) {
                // بنعيد توجيه الصفحة مع إضافة الـ ID في الرابط عشان يشتغل المشاهد
                window.location.href = window.location.href.split('?')[0] + "?join=" + targetId;
            } else {
                alert("اكتب الـ ID بتاع صاحبك الأول يا مكي!");
            }
        }

        // منطق المشاهد
        const urlParams = new URLSearchParams(window.location.search);
        const joinId = urlParams.get('join');

        if (joinId) {
            document.body.innerHTML = `
                <div class="h-screen bg-black flex flex-col items-center justify-center p-6 text-center">
                    <div class="mb-6">
                        <h1 class="text-2xl font-black text-cyan-400 mb-2">🎥 بث Ab Maki المباشر</h1>
                        <p class="text-zinc-500 text-sm">أنت الآن متصل بالبث رقم: <span class="text-white">${joinId}</span></p>
                    </div>
                    <video id="viewer-video" autoplay playsinline controls class="w-full max-w-4xl bg-zinc-900 rounded-3xl shadow-2xl border-4 border-cyan-500/20"></video>
                    <div class="mt-8 flex gap-4">
                        <button onclick="location.href=window.location.href.split('?')[0]" class="bg-zinc-800 px-6 py-2 rounded-full text-xs">العودة كصانع محتوى</button>
                    </div>
                </div>
            `;
            
            const viewerVideo = document.getElementById('viewer-video');
            
            // المشاهد بيتصل بصاحب البث
            setTimeout(() => {
                const call = peer.call(joinId, new MediaStream()); 
                call.on('stream', (remoteStream) => {
                    viewerVideo.srcObject = remoteStream;
                });
            }, 1000); // تأخير بسيط لضمان استقرار الربط
        }

        function toggleLive() {
            if(!currentStream) return alert("شغل الكاميرا أو الشاشة عشان الناس تشوفك!");
            const btn = document.getElementById('live-btn');
            btn.innerText = "أنت الآن لايف 🔴";
            btn.className = "bg-red-600 px-10 py-4 rounded-2xl font-black text-lg animate-pulse";
            document.getElementById('status-dot').querySelector('span').className = "w-3 h-3 bg-red-600 rounded-full animate-pulse";
            document.getElementById('status-text').innerText = "بث مباشر";
            document.getElementById('status-text').className = "text-red-500 font-bold";
        }

        // سيستم التعليقات الوهمي للحماس
        setInterval(() => {
            const names = ["عبدالله مكي", "ياسر", "عمرو"];
            const msgs = ["عاش يا مكي", "الصورة جبارة", "إيه العظمة دي"];
            if(messagesContainer) {
                const html = `<div class="bg-white/5 p-3 rounded-xl border-r-4 border-cyan-500">
                    <span class="text-cyan-400 block text-[10px] font-bold">${names[Math.floor(Math.random()*names.length)]}</span>
                    <span class="text-sm">${msgs[Math.floor(Math.random()*msgs.length)]}</span>
                </div>`;
                messagesContainer.insertAdjacentHTML('afterbegin', html);
            }
        }, 5000);
    </script>
</body>
</html>
